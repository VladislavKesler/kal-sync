name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # C# Tests
  # ─────────────────────────────────────────────────────────────────────────
  csharp-tests:
    name: C# — Build & Test
    runs-on: windows-latest   # MAUI Windows target requires Windows runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      # Build MAUI app for Windows only.
      # On a Windows runner the project would also try to compile for
      # net9.0-android / net9.0-ios / net9.0-maccatalyst — those targets
      # require SDKs that are not available on a Windows CI runner.
      # Scoping to the Windows TFM gives us a fast compilation smoke-test
      # without cross-platform SDK dependencies.
      - name: Build MAUI app (Windows target, compilation smoke-test)
        run: >
          dotnet build kal-sync.csproj
          --framework net9.0-windows10.0.19041.0
          --configuration Release

      # The test project is a plain net9.0 class library — it does NOT
      # reference the MAUI project, so it builds on any runner.
      - name: Build & run unit tests
        run: >
          dotnet test kal-sync.Tests/kal-sync.Tests.csproj
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: csharp-test-results
          path: "**/*.trx"

  # ─────────────────────────────────────────────────────────────────────────
  # Python Tests + Linting
  # ─────────────────────────────────────────────────────────────────────────
  python-tests:
    name: Python — Lint, Type Check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: garmin-backend   # All Python commands run here

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy .

      - name: Run unit tests (no integration tests in CI)
        run: >
          pytest
          -m "not integration"
          --cov=.
          --cov-report=term-missing
          --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: garmin-backend/.coverage
